<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiple Disease Prediction System</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

#loginPage{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1579154204601-01588f351e67")
    no-repeat center center fixed;
    background-size:cover;
}

.login-box{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:30px;
    border-radius:10px;
    width:300px;
}

input,button{
    width:100%;
    padding:10px;
    margin:6px 0;
}

button{
    cursor:pointer;
}

#dashboard{
    display:none;
    padding:20px;
    background:white;
    min-height:100vh;
}

.card{
    background:#f9f9f9;
    padding:20px;
    border-radius:10px;
    width:500px;
    margin-top:20px;
}

.result{
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
    line-height:1.8;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <p id="loginMsg"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Multiple Disease Prediction System</h2>

<div class="card">

    <h3>Enter Patient Details</h3>

    <input type="number" id="age" placeholder="Age">
    <input type="number" id="glucose" placeholder="Glucose">
    <input type="number" id="bmi" placeholder="BMI">
    <input type="number" id="bp" placeholder="Blood Pressure">
    <input type="number" id="albumin" placeholder="Albumin">
    <input type="number" id="creatinine" placeholder="Serum Creatinine">
    <input type="number" id="tsh" placeholder="TSH">
    <input type="number" id="t3" placeholder="T3">
    <input type="number" id="bilirubin" placeholder="Total Bilirubin">
    <input type="number" id="cholesterol" placeholder="Cholesterol">

    <button onclick="predictAll()">Predict All Diseases</button>

    <div class="result" id="result"></div>

</div>

<button onclick="logout()">Logout</button>

</div>

<script>

function login(){
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u==="Rachitha" && p==="1234"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";
    } else {
        document.getElementById("loginMsg").innerHTML="Invalid Login!";
    }
}

function predictAll(){

    let age = +document.getElementById("age").value;
    let glucose = +document.getElementById("glucose").value;
    let bmi = +document.getElementById("bmi").value;
    let bp = +document.getElementById("bp").value;
    let albumin = +document.getElementById("albumin").value;
    let creatinine = +document.getElementById("creatinine").value;
    let tsh = +document.getElementById("tsh").value;
    let t3 = +document.getElementById("t3").value;
    let bilirubin = +document.getElementById("bilirubin").value;
    let cholesterol = +document.getElementById("cholesterol").value;

    // ---- RULE BASED DEMO ----

    let kidney = (creatinine > 1.5 || bp > 140)
        ? "🔴 Kidney Disease DETECTED"
        : "🟢 No Kidney Disease";

    let liver = (bilirubin > 1.2 || albumin < 3.5)
        ? "🔴 Liver Disease DETECTED"
        : "🟢 No Liver Disease";

    let thyroid = (tsh > 4.5 || t3 < 1.0)
        ? "🔴 Thyroid Disease DETECTED"
        : "🟢 No Thyroid Disease";

    let diabetes = (glucose > 126 || bmi > 30)
        ? "🔴 Diabetes DETECTED"
        : "🟢 No Diabetes";

    let heart = (age > 50 || cholesterol > 200 || bp > 140)
        ? "🔴 Heart Disease DETECTED"
        : "🟢 No Heart Disease";

    document.getElementById("result").innerHTML =
        kidney + "<br>" +
        liver + "<br>" +
        thyroid + "<br>" +
        diabetes + "<br>" +
        heart;
}

function logout(){
    location.reload();
}

</script>

</body>
</html>
